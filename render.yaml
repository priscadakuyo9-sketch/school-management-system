services:
  - type: web
    name: edumanage-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run migrate:prod && npm start
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        value: sk_test_123
