version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edumanage-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: edumanage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d edumanage"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: edumanage-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/edumanage
      - JWT_SECRET=super-secret-key-edumanage
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build: ./frontend
    container_name: edumanage-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
